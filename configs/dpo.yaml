# Preference Optimization (DPO) config — QLoRA via Unsloth + TRL DPOTrainer.
# Starts from the merged SFT checkpoint.
#
# Set base_model to any HF model ID or local path.
# Set lora.target_modules: auto for automatic projection detection.

base_model: models/sft/merged
max_seq_len: 4096
load_in_4bit: true
use_unsloth: false                # Qwen3_5 VLM: Unsloth loads bf16 (OOMs 48 GB); force PEFT+bnb NF4. See configs/cpt.yaml.
enable_thinking: false
# auto = freeze if vision parameters detected; skip silently for pure LLMs.
freeze_vision_encoder: auto

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  use_rslora: true
  # "auto" inspects the loaded model and detects common projection names.
  # Override with an explicit list for uncommon architectures (see configs/models/).
  target_modules: auto

train_files: data/processed/dpo/train.jsonl
eval_files: data/processed/dpo/val.jsonl

beta: 0.1
loss_type: sigmoid
learning_rate: 5.0e-6
lr_scheduler: cosine
warmup_ratio: 0.05
num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
gradient_checkpointing: true
bf16: true

output_dir: models/dpo
save_steps: 100
eval_steps: 100
logging_steps: 10
seed: 3407
