# Continued Pretraining (CPT) config — QLoRA via Unsloth (or TRL+PEFT fallback).
#
# Set base_model to any HF model ID or local path.
# Set lora.target_modules: auto for automatic projection detection,
# or see configs/models/ for per-architecture presets.

base_model: Qwen/Qwen3.6-27B
load_in_4bit: true         # NF4; or NVFP4 if bitsandbytes gains Blackwell support
# Unsloth loads this Qwen3_5 VLM in bf16 (ignores load_in_4bit), which OOMs a 48 GB
# card — a 27B bf16 model needs ~54 GB. false forces the PEFT+bnb NF4 path (~14 GB).
# On the 96 GB reference rig you can set this true to use Unsloth's faster kernels.
use_unsloth: false
# auto = freeze if vision parameters detected; skip silently for pure LLMs.
# true = always freeze. false = never freeze.
freeze_vision_encoder: auto

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  use_rslora: true
  use_dora: false
  # "auto" inspects the loaded model and detects common projection names.
  # Override with an explicit list for uncommon architectures (see configs/models/).
  # Qwen3.6-27B SSM preset:  q_proj k_proj v_proj o_proj in_proj_qkv out_proj
  #                           in_proj_z in_proj_a in_proj_b gate_proj up_proj down_proj
  # Llama-3 / Mistral preset: q_proj k_proj v_proj o_proj gate_proj up_proj down_proj
  target_modules: auto

# Data: packed parquet produced by scripts/process/build_cpt_mix.py
train_files: data/processed/cpt/train/*.parquet
eval_files: data/processed/cpt/val/*.parquet
replay_fraction: 0.18      # consumed by scripts/process/build_cpt_mix.py (--replay-fraction), not the trainer; kept here as the canonical value

# Packing: enabled for CPT efficiency (~8x fewer steps than packing=false).
# flash-linear-attention + causal-conv1d are installed so SSM layers use fast kernels.
# Cross-document attention contamination is a tolerable noise for raw-text CPT.
# NOTE: SFT must use packing=false (response-masking breaks across document boundaries).
packing: true

# Optimization — conservative: starting from instruct, not base
learning_rate: 3.0e-5      # lower than typical CPT to preserve alignment
lr_scheduler: cosine
warmup_ratio: 0.05
num_train_epochs: 1

weight_decay: 0.01
gradient_checkpointing: true
bf16: true

output_dir: models/cpt
save_steps: 500
eval_steps: 2000
logging_steps: 20
# english_retention_check: run a small EN benchmark during CPT to detect catastrophic
# forgetting. NOT yet wired into cpt.py — retention is currently measured out-of-band via
# scripts/eval/run_eval.py --suite english. Left commented until implemented.
# english_retention_check: true

seed: 3407

#pilot run
per_device_train_batch_size: 1
gradient_accumulation_steps: 4    # was 32 → ~8× faster steps (~22 s/it)
max_steps: 20
max_seq_len: 2048

#full run remove max_steps
#per_device_train_batch_size: 2
#gradient_accumulation_steps: 16
#max_seq_len: 4096          # safe default; 96 GB allows ~8192 — raise after a pilot