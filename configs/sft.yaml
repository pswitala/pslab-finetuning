# Supervised Fine-Tuning (SFT) config — QLoRA via Unsloth + TRL SFTTrainer.
# Starts from the merged CPT checkpoint (or directly from Qwen/Qwen3.6-27B if
# CPT is skipped).
#
# See cpt.yaml header for full architecture notes.
# Key for SFT: model is instruct-mode by default; set enable_thinking: false so
# training examples don't have stray <think> tokens in the labels.

base_model: /home/pswitala/models/cpt-merged     # copy of merged from ntfs to ext4 on wsl / eg set to Qwen/Qwen3.6-27B to skip CPT stage
max_seq_len: 4096
load_in_4bit: true
# chat_template: do NOT set "qwen3" here — use the model's own built-in template
# (Qwen3.6-27B ships with chat_template.jinja). sft.py will apply it directly.
enable_thinking: false            # disable <think> blocks in training labels

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  use_rslora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - in_proj_qkv
    - out_proj
    - in_proj_z
    - in_proj_a
    - in_proj_b
    - gate_proj
    - up_proj
    - down_proj

train_files: data/processed/sft/train.jsonl
eval_files: data/processed/sft/val.jsonl
english_instruction_fraction: 0.10

learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.03
num_train_epochs: 3
gradient_checkpointing: true
bf16: true
train_on_responses_only: true
packing: false          # SFT must never pack — response masking breaks across boundaries

output_dir: models/sft
save_steps: 200
eval_steps: 200
logging_steps: 20
seed: 3407

per_device_train_batch_size: 2     # PILOT — restore to 4 for full run
gradient_accumulation_steps: 16    # PILOT — restore to 8 for full run
max_steps: 200          # PILOT — remove for full run